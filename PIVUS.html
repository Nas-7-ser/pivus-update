<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIVUS — Voir le mouvement de vos liquides</title>
<meta name="description" content="PIVUS mesure par ultrasons le champ de vitesses à l'intérieur des liquides, sans contact — au laboratoire comme en production. Contrôle non destructif des liquides.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  // Apply saved theme/language before first paint to avoid a flash.
  (function () {
    try {
      var th = localStorage.getItem('pivus_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', th);
      var lg = localStorage.getItem('pivus_lang') || 'fr';
      document.documentElement.setAttribute('lang', lg);
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#070c18"/>
    <path d="M14 50c8 0 8-22 16-22s8 44 16 44 8-44 16-44 8 22 16 22" fill="none" stroke="#2f6df0" stroke-width="4" stroke-linecap="round"/>
    <path d="M14 62c8 0 8-14 16-14s8 28 16 28 8-28 16-28 8 14 16 14" fill="none" stroke="#19c5e0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </svg>
</template>

<!-- moteur + données (JS classique) -->
<script src="velocity.js"></script>
<script src="fields.js"></script>
<script src="content.js"></script>
<script src="content-en.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<!-- composants (JSX) -->
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="contact.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
